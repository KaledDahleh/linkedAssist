<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>EasyReach</h1>
    <p class="subtitle">AI-powered DM drafting</p>

    <div class="field">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="Paste your Gemini API key">
      <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">Get a free API key</a>
    </div>

    <div class="field">
      <label for="tone">Default Tone</label>
      <select id="tone">
        <option value="professional">Professional</option>
        <option value="friendly">Friendly</option>
        <option value="casual">Casual</option>
        <option value="formal">Formal</option>
      </select>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="status" class="status"></div>

    <div class="instructions">
      <p>Open a LinkedIn conversation to see the drafting sidebar.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
